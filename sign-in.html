<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <title>sign-in</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/utilities.css" />
    <link rel="stylesheet" href="./css/component.css" />
    <link rel="stylesheet" href="./css/sign-in.css" />
  </head>
  <body>
    <header class="sign_header">
      <button onclick="history.back()" class="material-icons icon_14">arrow_back_ios</button>
      <h1><a href="./index.html">ROUNZ</a></h1>
    </header>
    <section class="contents sign_contents">
      <div class="sign_box">
        <img src="./images/promotion.jpg" alt="" />
        <div class="sign_in">
          <div class="sign_sns">
            <button class="pre_bold_16">
              <img src="./images/kakao.png" alt="" />
              카카오로 로그인
            </button>
            <button class="pre_bold_16">
              <img src="./images/naver.jpeg" alt="" />
              네이버로 로그인
            </button>
            <button class="pre_bold_16">
              <img src="./images/google.png" alt="" />
              구글로 로그인
            </button>
          </div>

          <form action="#" method="POST" class="login">
            <div class="sign_text">
              <div class="input_wrap">
                <input type="text" name="userid" class="text_box pre_reg_16" placeholder="아이디를 입력해주세요" />
                <p class="error_msg id_error pre_reg_12">아이디를 입력해주세요.</p>
              </div>
              <div class="input_wrap">
                <input
                  type="password"
                  name="password"
                  class="password_box pre_reg_16"
                  placeholder="비밀번호를 입력해주세요."
                />
                <p class="error_msg pw_error pre_reg_12">비밀번호를 입력해주세요.</p>
              </div>
              <div class="check_box">
                <input type="checkbox" id="check_box" />
                <label for="check_box" class="pre_reg_16">로그인 유지</label>
              </div>
            </div>
            <button type="submit" class="login_bt pre_bold_20">로그인</button>
          </form>

          <div class="login_box pre_reg_16">
            <a href="" class="text">아이디 / 비밀번호 찾기</a>
            <p>|</p>
            <a href="./sign-up.html" class="text">회원가입</a>
          </div>
        </div>
      </div>
    </section>
    <script type="module" src="./js/sign_in.js"></script>
  </body>
</html>
