<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF_8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/normalize.css" />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/utilities.css" />
    <link rel="stylesheet" href="../css/component.css" />
    <link rel="stylesheet" href="../css/map.css" />
    <title>Map</title>
  </head>
  <body>
    <header class="site_header"></header>

    <main class="store_search_container">
      <section class="store_tabs_section filters display_flex flex_column">
        <h2 class="pre_bold_16">매장 선택</h2>
        <div class="keyword_filters display_flex" role="tablist">
          <button type="button" class="keyword border_round pre_reg_16 active" role="tab" aria-selected="true">
            전체
          </button>
          <button type="button" class="keyword border_round pre_reg_16" role="tab" aria-selected="false">
            예약 매장
          </button>
          <button type="button" class="keyword border_round pre_reg_16" role="tab" aria-selected="false">
            관심 매장
          </button>
        </div>
      </section>

      <section class="store_map_section">
        <h3 class="screen_out">지도 및 검색</h3>

        <article class="store_sidebar">
          <div class="search_box_wrapper">
            <form action="#" method="get" onsubmit="return false;">
              <fieldset>
                <legend class="screen_out">매장 검색</legend>
                <input type="search" id="storeSearch" class="input_search" placeholder="검색어" />
                <button type="submit" class="btn_search_submit" aria-label="검색"></button>
              </fieldset>
            </form>
          </div>

          <div class="list_toggle_bar">
            <button type="button" class="btn_toggle_list" aria-expanded="false">매장 목록 열기</button>
          </div>

          <div class="store_list_wrapper" id="storeList">
            <ul class="store_list">
              <li class="store_item active">
                <button type="button" class="btn_favorite" aria-label="관심 매장 등록"></button>
                <strong class="store_name">라운즈 강남역점</strong>
                <address class="store_address">서울 강남구 역삼로 109 1층</address>
                <span class="store_tel">0507-1387-1041</span>
                <a href="#" class="btn_detail">상세보기</a>
              </li>
            </ul>
          </div>
        </article>

        <article class="map_view_area">
          <!-- 맵 API 자리 -->
          <div id="map" style="width: 100%; height: 350px"></div>
          <p>
            <button onclick="zoomIn()">지도레벨 - 1</button>
            <button onclick="zoomOut()">지도레벨 + 1</button>
            <span id="maplevel"></span>
          </p>

          <div class="map_overlay_card" hidden>
            <button type="button" class="btn_favorite" aria-label="관심 매장 등록"></button>
            <strong class="store_name display_block pre_bold_14">라운즈 강남역점</strong>
            <address class="store_address display_block pre_reg_12">
              서울 강남구 역삼로 109 1층<br />0507-1387-1041
            </address>
            <a href="#" class="btn_detail_blue display_flex justify_content_center align_items_center pre_reg_14"
              >상세보기</a
            >
          </div>
        </article>
      </section>
    </main>

    <footer class="site_footer">
      <h1>Footer</h1>
    </footer>

    <!-- <aside class="floating-quick-menu">
      <button type="button" class="btn-gotop" aria-label="페이지 맨 위로 이동"></button>
      <a href="#" class="link-virtual-fitting" aria-label="가상 피팅"></a>
      <button type="button" class="btn-chatbot" aria-label="챗봇 상담"></button>
    </aside> -->
    <script type="module">
      import renderHeader from '../js/components/header.js';
      renderHeader();
    </script>
    <script
      type="text/javascript"
      src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7e81f14ae23ad2cb3747737e1524bd9a"
    ></script>
    <script src="../js/map.js"></script>
  </body>
</html>
