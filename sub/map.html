            </div>
            <!-- 목록 열기 -->
            <div class="list_toggle_bar display_flex align_items_center">

                <span class="material-icons icon_16">menu</span>
                <span class="toggle_text">매장 목록 열기</span>
                <span class="material-icons icon_16 arrow">expand_more</span>
              </button>
            </div>
          </aside>
          <!-- 바텀 시트 핸들 -->
