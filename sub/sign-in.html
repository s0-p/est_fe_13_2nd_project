<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/normalize.css" />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/sign-in.css" />
    <title>Document</title>
  </head>
  <body>
    <header class="sign_header">
      <button onclick="history.back()"><p class="material-icons icon_14">arrow_back_ios</p> </button>
      <h1><a href="#">ROUNZ</a></h1>
    </header>
    <section class="contents sign-contents">
      <div class="sign-box">
        <div class="img">
          <img src="../imges/광고.jpg" alt="">
        </div>
        <div class="sign-in">
          <div class="sing-sns">
            <a href="#">
              <button class="pre_bold_16">
                <img src="../imges/카카오.png" alt="">
                카카오로 로그인
              </button>
            </a>
            <a href="#">
              <button class="pre_bold_16">
                <img src="../imges/네이버.jpeg" alt="">
                네이버로 로그인
              </button>
            </a>
            <a href="#">
              <button class="pre_bold_16">
                <img src="../imges/구글.png" alt="">
                구글로 로그인
              </button>
            </a>
          </div>
          <div class="login">
            <div class="sing-text">
              <input type="text" class="text-box mont_reg_16" placeholder="이름을 입력해주세요">
              <input type="password" class="password-box mont_reg_16" placeholder="비밀번호를 입력해주세요."> 
              <div class="check-box">
                <input type="checkbox" name="check-box" id="check-box">
                <p class="mont_reg_16">로그인 유지</p>
              </div>
            </div>
            <button class="login-bt pre_bold_20">로그인</button>
          </div>
          <div class="login-box mont_reg_16">
            <a href="" class="text">아이디 / 비밀번호 찾기</a>
            <p>|</p>
            <a href="./sign-up.html" class="text">회원가입</a>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
