<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/normalize.css" />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/utilities.css" />
    <link rel="stylesheet" href="../css/sign-in.css" />
    <title>sign-in</title>
  </head>
  <body>
    <header class="sign_header">
      <button onclick="history.back()" class="material-icons icon_14">arrow_back_ios</button>
      <h1><a href="../index.html">ROUNZ</a></h1>
    </header>
    <section class="contents sign_contents">
      <div class="sign_box">
        <img src="../images/promotion.jpg" alt="" />
        <div class="sign_in">
          <div class="sing_sns">
              <button class="pre_bold_16">
                <img src="../images/kakao.png" alt="" />
                카카오로 로그인
              </button>
              <button class="pre_bold_16">
                <img src="../images/naver.jpeg" alt="" />
                네이버로 로그인
              </button>
              <button class="pre_bold_16">
                <img src="../images/google.png" alt="" />
                구글로 로그인
              </button>
          </div>
          <div class="login">
            <div class="sing_text">
              <input type="text" class="text_box pre_reg_16" placeholder="이름을 입력해주세요" />
              <input type="password" class="password_box pre_reg_16" placeholder="비밀번호를 입력해주세요." />
              <div class="check_box">
                <input type="checkbox" name="check_box" id="check_box" />
                <p class="pre_reg_16">로그인 유지</p>
              </div>
            </div>
            <button class="login_bt pre_bold_20">로그인</button>
          </div>
          <div class="login_box pre_reg_16">
            <a href="" class="text">아이디 / 비밀번호 찾기</a>
            <p>|</p>
            <a href="./sign-up.html" class="text">회원가입</a>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
