<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <base href="/est_fe_13_2nd_project/" />
    <title>Cart</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/normalize.css" />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/utilities.css" />
    <link rel="stylesheet" href="../css/component.css" />
    <link rel="stylesheet" href="../css/cart.css" />
  </head>
  <body>
    <header class="site_header"></header>

    <main class="contents cart_page">
      <section class="shopping_bag display_flex align_items_center flex_column" aria-labelledby="shopping_bag_title">
        <h1
          id="shopping_bag_title"
          class="shopping_bag_tab display_flex align_items_center justify_content_center pre_reg_14"
        >
          장바구니(<span>0</span>)
        </h1>

        <div class="cart_container display_flex flex_column">
          <section class="cart_product display_grid" aria-label="장바구니 상품 목록"></section>

          <aside class="order_info" aria-label="주문 정보">
            <div class="order_info_content display_grid">
              <section class="delivery_info display_grid" aria-labelledby="delivery_title">
                <h2 id="delivery_title" class="summary_label pre_bold_14">배송 정보</h2>
                <div class="summary_row pre_reg_14">
                  <span class="delivery_date"></span>
                  <strong>무료배송</strong>
                </div>
              </section>

              <section class="order_summary" aria-labelledby="order_summary_title">
                <h2 id="order_summary_title" class="sr_only">주문 금액</h2>
                <dl class="display_grid">
                  <div class="summary_row">
                    <dt class="summary_label pre_bold_14">상품 금액</dt>
                    <dd class="pre_reg_14 before_discount_price">₩ ---,---</dd>
                  </div>
                  <div class="summary_row">
                    <dt class="summary_label pre_bold_14">배송비</dt>
                    <dd class="pre_reg_14">₩ 0</dd>
                  </div>
                  <div class="discount_row">
                    <dt class="summary_label pre_bold_14">할인 금액</dt>
                    <dd class="display_grid">
                      <button class="coupon_button text_center pre_reg_12" type="button" aria-haspopup="dialog">
                        쿠폰 적용
                      </button>
                      <span class="pre_reg_14 discount_price">₩ ---,---</span>
                    </dd>
                  </div>
                </dl>
              </section>

              <section class="total_price_container" aria-label="총 결제 금액">
                <h2 class="pre_bold_16">Total Price</h2>
                <p class="pre_bold_16 total_price" aria-live="polite">₩ ---,---</p>
              </section>

              <button
                class="checkout_button desktop_checkout align_items_center justify_content_center pre_bold_20"
                type="button"
              >
                <span>결제하기</span>
                <span class="total_price" aria-live="polite">₩ ---,---</span>
              </button>
            </div>
          </aside>
        </div>

        <div class="mobile_cta display_grid">
          <button class="checkout_button align_items_center justify_content_center pre_bold_20" type="button">
            <span>결제하기</span>
            <span class="total_price" aria-live="polite">₩ ---,---</span>
          </button>
          <button
            class="ask_button display_inline_flex align_items_center justify_content_center"
            type="button"
            aria-label="Try on"
          >
            <img src="../images/side_bar_4.png" alt="문의하기 버튼" aria-label="문의하기 버튼" />
          </button>
        </div>
      </section>
    </main>

    <footer class="site_footer"></footer>

    <!-- 바텀 시트 , 모달 -->
    <section
      class="option_modal modal contents display_flex justify_content_center align_items_center"
      role="dialog"
      aria-modal="true"
      aria-labelledby="option_modal_title"
      hidden
    >
      <div class="modal_dim"></div>
      <article class="modal_panel option_panel">
        <span class="bottom_sheet_bar display_block" aria-hidden="true"></span>
        <header class="modal_header pre_reg_24">
          <h2 id="option_modal_title">옵션 변경</h2>
          <button class="modal_close" type="button" aria-label="닫기">
            <span class="material-icons icon_24" aria-hidden="true">close</span>
          </button>
        </header>
        <!-- 모바일 옵션 수정 바텀시트 -->
        <div class="option_select_container display_grid">
          <button class="option_select pre_reg_16" type="button">프레임 색상을 선택해주세요.</button>
          <ul class="select_list">
            <li class="select_item">
              <button type="button" data-price="0">
                색상 1
                <span>₩ 0</span>
              </button>
            </li>

            <li class="select_item">
              <button type="button" data-price="10000">
                색상 2
                <span>₩ 10,000</span>
              </button>
            </li>
          </ul>
          <button class="option_select pre_reg_16" type="button">렌즈 색상을 선택해주세요.</button>
          <ul class="select_list" hidden>
            <li class="select_item">
              <button type="button" data-price="0">
                색상 1
                <span>₩ 0</span>
              </button>
            </li>

            <li class="select_item">
              <button type="button" data-price="10000">
                색상 2
                <span>₩ 10,000</span>
              </button>
            </li>
          </ul>

          <button class="option_select pre_reg_16" type="button">렌즈 크기를 선택해주세요.</button>
          <ul class="select_list" hidden>
            <li class="select_item">
              <button type="button" data-price="0">
                크기 1
                <span>₩ 0</span>
              </button>
            </li>

            <li class="select_item">
              <button type="button" data-price="15000">
                크기 2
                <span>₩ 15,000</span>
              </button>
            </li>
          </ul>
        </div>
        <!-- 태블릿, 데스크탑 옵션 수정 바텀시트 / 모달 -->
        <div class="option_list_box">
          <section class="option_item">
            <h3 class="pre_bold_12">프레임 색상</h3>
            <div class="option_list pre_reg_12">
              <label><input type="radio" name="frame" checked /> 옵션 <span>+ 10,000</span></label>
              <label><input type="radio" name="frame" /> 옵션 <span>+ 10,000</span></label>
              <label><input type="radio" name="frame" /> 옵션 <span>+ 10,000</span></label>
            </div>
          </section>
          <section class="option_item">
            <h3 class="pre_bold_12">렌즈 색상</h3>
            <div class="option_list pre_reg_12">
              <label><input type="radio" name="lens_color" checked /> 옵션 <span>+ 10,000</span></label>
              <label><input type="radio" name="lens_color" /> 옵션 <span>+ 10,000</span></label>
              <label><input type="radio" name="lens_color" /> 옵션 <span>+ 10,000</span></label>
            </div>
          </section>
          <section class="option_item">
            <h3 class="pre_bold_12">렌즈 크기</h3>
            <div class="option_list pre_reg_12">
              <label><input type="radio" name="lens_size" checked /> 옵션 <span>+ 10,000</span></label>
              <label><input type="radio" name="lens_size" /> 옵션 <span>+ 10,000</span></label>
              <label><input type="radio" name="lens_size" /> 옵션 <span>+ 10,000</span></label>
            </div>
          </section>
        </div>
        <div class="modal_total pre_bold_16">
          <span>Total Price</span>
          <strong>₩ ---,---</strong>
        </div>
        <button class="apply_button pre_reg_16" type="button">적용하기</button>
      </article>
    </section>
    <!-- 쿠폰 바텀 시트 (모바일, 태블릿) / 모달 (데스크탑) -->
    <section
      class="coupon_modal modal contents display_flex justify_content_center align_items_center"
      role="dialog"
      aria-modal="true"
      aria-labelledby="coupon_modal_title"
      hidden
    >
      <div class="modal_dim"></div>
      <article class="modal_panel coupon_panel">
        <span class="bottom_sheet_bar display_block" aria-hidden="true"></span>
        <header class="modal_header pre_reg_24">
          <h2 id="coupon_modal_title">쿠폰 적용</h2>
          <button class="modal_close" type="button" aria-label="닫기">
            <span class="material-icons icon_24" aria-hidden="true">close</span>
          </button>
        </header>
        <select class="option_select coupon_select pre_reg_16" name="coupon_select">
          <option>쿠폰을 선택해주세요.</option>
        </select>
        <div class="modal_total pre_bold_16">
          <span>Total Price</span>
          <strong class="discount_price">₩ ---,---</strong>
        </div>
        <button class="apply_button pre_reg_16" type="button">적용하기</button>
      </article>
    </section>

    <!-- 상품 삭제 모달 -->
    <section class="delete_modal modal" role="dialog" aria-modal="true" aria-labelledby="delete_modal_title" hidden>
      <div class="modal_dim"></div>
      <article class="delete_panel">
        <span class="material-icons icon_24">remove_shopping_cart</span>
        <h2 id="delete_modal_title" class="pre_bold_14">상품을 삭제 하시겠습니까?</h2>
        <p class="text_center pre_reg_14">삭제한 상품은 장바구니에서 사라집니다.</p>
        <div class="delete_actions display_grid">
          <button class="cancel_button pre_reg_16" type="button">취소</button>
          <button class="confirm_delete_button pre_reg_16" type="button">삭제</button>
        </div>
      </article>
    </section>
    <script type="module" src="../js/cart.js"></script>
  </body>
</html>
