<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <title>라운즈 | 상품 조회</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/utilities.css" />
    <link rel="stylesheet" href="./css/component.css" />
    <link rel="stylesheet" href="./css/product-list.css" />
  </head>
  <body>
    <section class="contents display_flex flex_column align_items_center">
      <div class="filters display_flex justify_content_between">
        <ul class="keyword_filters display_flex col_gutter_gap">
          <li class="keyword border_round display_flex align_items_center">
            <input type="checkbox" id="sunglass_category" name="category" value="sunglass" />
            <label for="sunglass_category" class="pre_reg_16">선글라스</label>
          </li>
          <li class="keyword border_round display_flex align_items_center">
            <input type="checkbox" id="glasses_frame" name="category" value="glasses_frame" />
            <label for="glasses_frame" class="pre_reg_16">안경테</label>
          </li>
          <li class="keyword border_round display_flex align_items_center">
            <input type="checkbox" id="available" name="available" value="available" />
            <label for="available" class="pre_reg_16">품절 제외</label>
          </li>
        </ul>
        <div>
          <div class="btns_wrapper display_flex align_items_center col_gutter_gap">
            <button class="display_flex sort_btn display_inline_flex align_items_center">
              <div class="material-icons icon_24">sort</div>
              <div class="pre_reg_16 display_none">최신순</div>
            </button>
            <button class="filter_btn display_inline_flex align_items_center">
              <div class="material-icons icon_24">tune</div>
              <div class="mont_reg_16 display_none">Filter</div>
            </button>
          </div>
          <ul class="sort_panel glassmorphism display_none">
            <li class="gradient_light_border">
              <input type="radio" id="latest" name="sort" value="latest" checked />
              <label for="latest" class="pre_reg_14">최신순</label>
            </li>
            <li class="gradient_light_border">
              <input type="radio" id="popularity" name="sort" value="popularity" />
              <label for="popularity" class="pre_reg_14">인기순</label>
            </li>
            <li class="gradient_light_border">
              <input type="radio" id="most_reviews" name="sort" value="most_reviews" />
              <label for="most_reviews" class="pre_reg_14">리뷰 많은 순</label>
            </li>
            <li class="gradient_light_border">
              <input type="radio" id="lowest_price" name="sort" value="lowest_price" />
              <label for="lowest_price" class="pre_reg_14">낮은 가격순</label>
            </li>
            <li class="gradient_light_border">
              <input type="radio" id="highest_price" name="sort" value="highest_price" />
              <label for="highest_price" class="pre_reg_14">높은 가격순</label>
            </li>
          </ul>
        </div>
      </div>
      <div>
        <div class="product_count_wrapper display_flex justify_content_end">
          <h2 class="product_count pre_reg_12">--개 상품</h2>
        </div>
        <div class="product_list display_grid flex_column align_items_center"></div>
      </div>
      <button class="more_btn text_center border_round pre_reg_18">더보기</button>
    </section>
    <div class="filter_modal_wrapper display_none justify_content_center align_items_center">
      <div class="filter_modal display_flex flex_column">
        <div class="close_btn material-icons">close</div>
        <div class="filter_sets_wrapper display_flex flex_column">
          <div class="filter_set display_flex flex_column display_flex flex_wrap">
            <div>
              <div class="filter_type brand pre_bold_14">브랜드</div>
            </div>
            <div class="filter_options_wrapper display_flex flex_wrap">
              <!-- <div class="filter_option pre_reg_18 border_round display_inline_block">라운드</div> -->
            </div>
          </div>
          <div class="filter_set display_flex flex_column display_flex flex_wrap">
            <div>
              <div class="filter_type origin pre_bold_14">원산지</div>
            </div>
            <div class="filter_options_wrapper display_flex flex_wrap">
              <!-- <div class="filter_option pre_reg_18 border_round display_inline_block">라운드</div> -->
            </div>
          </div>
        </div>
        <div class="btns_wrapper pre_reg_14 display_flex justify_content_end">
          <div class="reset_btn border_round pre_reg_14">초기화</div>
          <div class="apply_btn border_round pre_reg_14">필터 적용</div>
        </div>
      </div>
    </div>
    <div class="toast_wrapper display_flex">
      <div class="toast_cart glassmorphism border_round display_flex justify_content_between align_items_center">
        <div class="message display_flex align_items_center">
          <div class="material-icons icon_24 gradient_text">check_circle</div>
          <div class="toast_text_wrapper">
            <span class="pre_reg_16">장바구니 담기 완료!</span>
            <span class="product_name pre_reg_14 truncate">상품명</span>
          </div>
        </div>
        <a href="./cart.html" class="material-icons icon_24 gradient_text">arrow_forward_ios</a>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script type="module" src="./js/product-list.js"></script>
  </body>
</html>
